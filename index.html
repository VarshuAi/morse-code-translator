<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Morse Translator — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📡</span>
                <div class="title-col">
                    <h1>Quantum Morse Translator</h1>
                    <p class="tagline">Text converter rendering alphanumeric codes to traditional morse notation.</p>
                </div>
            </div>
            <div class="badge">calculators</div>
        </header>

        <main class="workspace-card">
            
            <textarea id="morse-inp" placeholder="Type message..."></textarea>
            <div id="morse-res" style="font-size: 20px; font-weight: bold; margin-top: 16px; word-break: break-all; color: var(--accent);"></div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
